[defaults]
# Menonaktifkan verifikasi host key SSH agar koneksi pertama kali langsung sukses tanpa prompt
host_key_checking = False

# Menyembunyikan peringatan depresiasi modul Ansible yang usang agar output terminal rapi
deprecation_warnings = False

[ssh_connection]
# Memaksa SSH mengabaikan host key yang berubah saat VM dihancurkan dan dibuat ulang (destroy & recreate)
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
